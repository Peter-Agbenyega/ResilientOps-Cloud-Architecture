# -----------------------------------------------------------------------------
# ResilientOps AWS Reference Architecture
# Terraform workflow for formatting, validation, planning, and controlled apply.
#
# Notes:
# - Uses a PR-first workflow to keep infrastructure changes reviewable.
# - Assumes backend resources already exist.
# - Assumes a local-style var file is injected into the runner if plan/apply is enabled.
# -----------------------------------------------------------------------------

name: ResilientOps Terraform Deploy (Dev)

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform (Dev)
    runs-on: ubuntu-latest
    environment: cloudnexus-development

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (PR Only)
        if: github.event_name == 'pull_request'
        run: terraform plan -input=false -var-file=dev.tfvars

      - name: Terraform Apply (Main Only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false -var-file=dev.tfvars

